<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #FFFFFF; background-image: radial-gradient(at 10% 10%, rgba(212, 175, 55, 0.03) 0px, transparent 50%); }
        .gold-text { color: #D4AF37; }
        .clean-card { background-color: #FDFDFD; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); }
        
        /* CALENDÁRIO */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; font-size: 0.85rem; font-weight: 600; }
        .day-free { background: #ecfdf5; color: #059669; border-color: #a7f3d0; } 
        .day-busy { background: #fef2f2; color: #dc2626; cursor: not-allowed; opacity: 0.5; }
        .day-selected { background: #D4AF37 !important; color: white !important; border-color: #B8860B !important; }
        
        /* HORÁRIOS */
        .time-slot { padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.9rem; }
        .time-selected { background: #D4AF37; color: white; border-color: #D4AF37; }
        .occupied { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; text-decoration: line-through; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="text-center mb-10">
        <div class="w-20 h-20 rounded-full border-2 border-[#D4AF37] mx-auto mb-3 overflow-hidden">
            <img src="image_5.png" alt="Rivi Silva" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
        </div>
        <h1 class="text-2xl font-light tracking-widest uppercase text-zinc-800">Rivi Silva <span class="font-bold gold-text">Esmalteria</span></h1>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <div class="flex flex-col gap-6">
            <h2 class="text-4xl font-light text-zinc-900 leading-tight">
                Seu momento de brilhar começa aqui, <span class="font-semibold gold-text">gata. 💅</span>
            </h2>
            <p class="text-zinc-500 italic border-l-4 border-gold pl-4">"Unhas feitas, auto-estima renovada. Escolha sua data e brilhe."</p>
        </div>

        <div class="clean-card p-6 md:p-8 rounded-3xl space-y-6">
            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2">Seus Dados</label>
                <input id="nome" type="text" placeholder="Nome Completo" class="w-full p-4 border rounded-2xl outline-none focus:border-gold mb-3">
                <input id="whatsapp" type="tel" placeholder="WhatsApp" class="w-full p-4 border rounded-2xl outline-none focus:border-gold">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2">Serviços</label>
                <div id="listaServicos" class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto p-2 border rounded-xl bg-white mb-3">
                    </div>
                <div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-zinc-400 text-sm">Total:</span>
                    <span id="totalDisplay" class="text-white font-bold text-xl">R$ 0,00</span>
                </div>
            </div>

            <div class="pt-4 border-t border-zinc-100">
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-3">Selecione o Dia Disponível</label>
                <div class="flex justify-between items-center mb-2 px-1">
                    <span id="monthName" class="text-sm font-bold text-zinc-700 capitalize">Março 2026</span>
                </div>
                <div class="calendar-grid text-center text-[10px] font-bold text-zinc-400 mb-2 uppercase">
                    <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
                </div>
                <div id="calendarDays" class="calendar-grid"></div>
            </div>

            <div id="section-horarios" class="hidden space-y-4 pt-4 border-t border-dashed border-zinc-200">
                <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest">Horários para <span id="selected-date-display" class="gold-text">--/--</span></label>
                <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
                
                <button onclick="finalizarAgendamento()" class="w-full bg-[#D4AF37] text-white font-bold py-5 rounded-2xl shadow-lg hover:brightness-110 transition uppercase tracking-widest mt-4">
                    RESERVAR AGORA ✨
                </button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let dataSelecionada = null;
        let horaSelecionada = null;
        const horariosPadrao = ["08:00", "09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        async function init() {
            const container = document.getElementById('calendarDays');
            const dataAtual = new Date();
            const { data: bloqueios } = await _supabase.from('agenda_bloqueada').select('data_interditada');
            const bloqueados = bloqueios?.map(b => b.data_interditada) || [];

            const primeiroDia = new Date(dataAtual.getFullYear(), dataAtual.getMonth(), 1).getDay();
            const totalDias = new Date(dataAtual.getFullYear(), dataAtual.getMonth() + 1, 0).getDate();

            container.innerHTML = '';
            for(let i=0; i<primeiroDia; i++) container.innerHTML += '<div></div>';

            for(let d=1; d<=totalDias; d++) {
                const dataStr = `${dataAtual.getFullYear()}-${String(dataAtual.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isPast = new Date(dataStr) < new Date().setHours(0,0,0,0);
                const isBlocked = bloqueados.includes(dataStr);
                
                const box = document.createElement('div');
                box.className = `day-box ${ (isPast || isBlocked) ? 'day-busy' : 'day-free' }`;
                box.innerText = d;
                if(!isPast && !isBlocked) box.onclick = () => selecionarDia(box, dataStr);
                container.appendChild(box);
            }
            carregarServicos();
        }

        async function selecionarDia(el, data) {
            document.querySelectorAll('.day-box').forEach(d => d.classList.remove('day-selected'));
            el.classList.add('day-selected');
            dataSelecionada = data;
            document.getElementById('section-horarios').classList.remove('hidden');
            document.getElementById('selected-date-display').innerText = data.split('-').reverse().join('/');

            const { data: ocupados } = await _supabase.from('agendamentos').select('horario_agendado').eq('data_agendada', data);
            const ocupadosList = ocupados?.map(o => o.horario_agendado.substring(0, 5)) || [];

            const slots = document.getElementById('time-slots');
            slots.innerHTML = '';
            horariosPadrao.forEach(h => {
                const isOcupado = ocupadosList.includes(h);
                const btn = document.createElement('div');
                btn.className = `time-slot ${isOcupado ? 'occupied' : ''}`;
                btn.innerText = h;
                if(!isOcupado) btn.onclick = () => {
                    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('time-selected'));
                    btn.classList.add('time-selected');
                    horaSelecionada = h;
                };
                slots.appendChild(btn);
            });
        }

        async function carregarServicos() {
            const { data } = await _supabase.from('servicos').select('*').order('nome');
            if(data) {
                document.getElementById('listaServicos').innerHTML = data.map(s => `
                    <label class="flex justify-between items-center p-3 hover:bg-zinc-50 cursor-pointer rounded-lg">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" value="${s.id}" data-price="${s.preco}" onchange="calcTotal()" class="accent-gold w-4 h-4">
                            <span class="text-sm font-medium">${s.nome}</span>
                        </div>
                        <span class="text-zinc-400 text-xs font-bold italic">R$ ${s.preco}</span>
                    </label>
                `).join('');
            }
        }

        function calcTotal() {
            let total = 0;
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => total += parseFloat(c.dataset.price));
            document.getElementById('totalDisplay').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        async function finalizarAgendamento() {
            const nome = document.getElementById('nome').value;
            const zap = document.getElementById('whatsapp').value;
            const svs = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value);

            if(!nome || !zap || !dataSelecionada || !horaSelecionada || svs.length === 0) {
                return alert("Falta preencher algo, gata! Nome, zap, serviço ou horário. 💅");
            }

            const { error } = await _supabase.from('agendamentos').insert([{
                cliente_nome: nome, cliente_whatsapp: zap,
                data_agendada: dataSelecionada, horario_agendado: horaSelecionada,
                servico_id: svs[0]
            }]);

            if(error) alert("Erro ao agendar: " + error.message);
            else { alert("AGENDADO COM SUCESSO! ✨💖"); location.reload(); }
        }

        init();
    </script>
</body>
</html>

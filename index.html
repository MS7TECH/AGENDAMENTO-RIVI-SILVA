<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fdfdfd; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; font-size: 0.85rem; }
        .day-free { background: #ecfdf5; color: #059669; border-color: #a7f3d0; } /* Verde */
        .day-busy { background: #fef2f2; color: #dc2626; cursor: not-allowed; opacity: 0.6; } /* Vermelho */
        .day-selected { background: #D4AF37 !important; color: white !important; border-color: #B8860B !important; }
        .time-slot { padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; }
        .time-slot:hover { border-color: #D4AF37; color: #D4AF37; }
        .time-selected { background: #D4AF37; color: white; border-color: #D4AF37; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-light text-zinc-800">Rivi Silva <span class="font-bold text-gold text-[#D4AF37]">Esmalteria</span></h1>
        <p class="text-zinc-500 text-sm uppercase tracking-widest mt-2">Escolha seu dia e brilhe</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
            <div class="flex justify-between items-center mb-4">
                <h3 id="monthName" class="font-bold text-zinc-700 capitalize">Março 2026</h3>
            </div>
            
            <div class="calendar-grid text-center text-xs font-bold text-zinc-400 mb-2">
                <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
            </div>
            <div id="calendarDays" class="calendar-grid">
                </div>
            
            <div class="mt-4 flex gap-4 text-xs">
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-green-100 border border-green-300 rounded"></span> Livre</div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-red-100 border border-red-300 rounded"></span> Ocupado</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-100">
            <div id="step-info">
                <p class="text-zinc-400 text-center py-10">Selecione um dia no calendário para ver os horários. ✨</p>
            </div>

            <div id="booking-form" class="hidden space-y-4">
                <h4 class="font-bold text-zinc-700 border-b pb-2">Horários para dia <span id="selected-date-display">--</span></h4>
                <div id="time-slots" class="grid grid-cols-3 gap-2">
                    </div>

                <div class="pt-4 space-y-3">
                    <input id="nome" type="text" placeholder="Seu Nome" class="w-full p-3 border rounded-xl outline-none focus:border-gold">
                    <input id="whatsapp" type="tel" placeholder="Seu WhatsApp" class="w-full p-3 border rounded-xl outline-none focus:border-gold">
                    
                    <div class="bg-zinc-50 p-3 rounded-xl border">
                        <p class="text-xs text-zinc-500 uppercase">Serviços Selecionados:</p>
                        <p id="totalDisplay" class="font-bold text-gold text-[#D4AF37]">R$ 0,00</p>
                    </div>

                    <button onclick="finalizarAgendamento()" class="w-full bg-[#D4AF37] text-white font-bold py-4 rounded-xl shadow-lg hover:brightness-110 transition">
                        RESERVAR AGORA ✨
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let dataSelecionada = null;
        let horaSelecionada = null;
        const horariosPadrao = ["08:00", "09:00", "10:00", "11:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        async function renderizarCalendario() {
            const container = document.getElementById('calendarDays');
            const dataAtual = new Date();
            const ano = dataAtual.getFullYear();
            const mes = dataAtual.getMonth();

            // Pega dias bloqueados do banco
            const { data: bloqueios } = await _supabase.from('agenda_bloqueada').select('data_interditada');
            const diasBloqueados = bloqueios?.map(b => b.data_interditada) || [];

            const primeiroDiaMes = new Date(ano, mes, 1).getDay();
            const totalDiasMes = new Date(ano, mes + 1, 0).getDate();

            container.innerHTML = '';

            // Espaços vazios
            for (let i = 0; i < primeiroDiaMes; i++) {
                container.innerHTML += '<div></div>';
            }

            // Dias do mês
            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const dataString = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const isBloqueado = diasBloqueados.includes(dataString);
                const isPassado = new Date(dataString) < new Date().setHours(0,0,0,0);
                
                const classeCor = (isBloqueado || isPassado) ? 'day-busy' : 'day-free';
                
                const diaElement = document.createElement('div');
                diaElement.className = `day-box ${classeCor}`;
                diaElement.innerText = dia;
                if (!isBloqueado && !isPassado) {
                    diaElement.onclick = () => selecionarDia(diaElement, dataString);
                }
                container.appendChild(diaElement);
            }
        }

        async function selecionarDia(elemento, dataStr) {
            document.querySelectorAll('.day-box').forEach(d => d.classList.remove('day-selected'));
            elemento.classList.add('day-selected');
            
            dataSelecionada = dataStr;
            document.getElementById('selected-date-display').innerText = dataStr.split('-').reverse().join('/');
            document.getElementById('step-info').classList.add('hidden');
            document.getElementById('booking-form').classList.remove('hidden');

            // Busca horários já ocupados no banco para esse dia
            const { data: ocupados } = await _supabase.from('agendamentos').select('horario_agendado').eq('data_agendada', dataStr);
            const listaOcupados = ocupados?.map(o => o.horario_agendado.substring(0, 5)) || [];

            const timeContainer = document.getElementById('time-slots');
            timeContainer.innerHTML = '';

            horariosPadrao.forEach(hora => {
                const isOcupado = listaOcupados.includes(hora);
                const slot = document.createElement('div');
                slot.className = `time-slot ${isOcupado ? 'bg-zinc-100 text-zinc-300 cursor-not-allowed opacity-50' : ''}`;
                slot.innerText = hora;
                if (!isOcupado) {
                    slot.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('time-selected'));
                        slot.classList.add('time-selected');
                        horaSelecionada = hora;
                    };
                }
                timeContainer.appendChild(slot);
            });
        }

        async function finalizarAgendamento() {
            const nome = document.getElementById('nome').value;
            const whatsapp = document.getElementById('whatsapp').value;

            if (!nome || !whatsapp || !horaSelecionada) {
                return alert("Preencha seu nome, zap e escolha o horário! 💅");
            }

            const { error } = await _supabase.from('agendamentos').insert([{
                cliente_nome: nome,
                cliente_whatsapp: whatsapp,
                data_agendada: dataSelecionada,
                horario_agendado: horaSelecionada,
                servico_id: '8665f826-6d65-4f6c-8e6d-616c61636163' // Exemplo: ID fixo ou pegue do select anterior
            }]);

            if (error) return alert("Erro ao agendar: " + error.message);

            alert("Agendado com sucesso! Te esperamos. ✨");
            location.reload();
        }

        renderizarCalendario();
    </script>
</body>
</html>

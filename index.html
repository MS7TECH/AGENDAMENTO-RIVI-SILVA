<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        black: '#000000',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #D4AF37; }
        .form-input { 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            color: white; 
        }
        .form-input:focus { border-color: #D4AF37; outline: none; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">Rivi Silva</h1>
        <p class="text-xs uppercase tracking-widest text-zinc-500">Nails & Care</p>
    </header>

    <main class="w-full max-w-md bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-xl">
        <h2 class="text-2xl font-semibold mb-6 text-white text-center">Agendamento Online</h2>

        <div class="space-y-4">
            <div>
                <label class="block mb-1 text-sm text-zinc-400">Nome da Cliente</label>
                <input id="nome" type="text" class="form-input w-full p-3 rounded-lg">
            }
            
            <div>
                <label class="block mb-1 text-sm text-zinc-400">Telefone</label>
                <input id="telefone" type="tel" placeholder="(00) 90000-0000" class="form-input w-full p-3 rounded-lg">
            }

            <div>
                <label class="block mb-1 text-sm text-zinc-400">Serviço</label>
                <select id="servico" class="form-input w-full p-3 rounded-lg cursor-pointer">
                    <option value="" disabled selected>Selecione...</option>
                    <option>Alongamento em Gel</option>
                    <option>Banho de Gel</option>
                    <option>Manicure Simples</option>
                </select>
            }

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm text-zinc-400">Data</label>
                    <input id="data" type="date" class="form-input w-full p-3 rounded-lg cursor-pointer">
                }
                <div>
                    <label class="block mb-1 text-sm text-zinc-400">Horário</label>
                    <input id="horario" type="time" class="form-input w-full p-3 rounded-lg cursor-pointer">
                }
            </div>

            <button onclick="finalizarAgendamento()" class="w-full bg-gold text-black font-bold py-4 mt-6 rounded-lg hover:bg-yellow-600 transition duration-300">
                CONFIRMAR AGENDAMENTO ✨
            </button>
        </div>
    </main>

    <script>
        // CONEXÃO DIRETA COM O SEU BANCO
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'SUA_CHAVE_ANON_AQUI'; // <--- COLOQUE SUA CHAVE AQUI
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function finalizarAgendamento() {
            // Pega os valores
            const nomeValue = document.getElementById('nome').value;
            const telefoneValue = document.getElementById('telefone').value;
            const servicoValue = document.getElementById('servico').value;
            const dataValue = document.getElementById('data').value;
            const horarioValue = document.getElementById('horario').value;

            // Validação simples
            if(!nomeValue || !servicoValue || !dataValue || !horarioValue) {
                return alert("Preencha todos os campos, gata! 💅");
            }

            // Tenta salvar no banco
            const { error } = await _supabase
                .from('agendamentos') // Confirme se o nome da tabela no Supabase é esse
                .insert([{ 
                    cliente_nome: nomeValue, 
                    telefone: telefoneValue, 
                    servico: servicoValue, 
                    data: dataValue, 
                    horario: horarioValue,
                    status: 'Pendente'
                }]);

            if (error) {
                console.error(error);
                alert('Erro ao agendar. Verifique a tabela no banco!');
            } else {
                alert('Agendamento feito com sucesso! ✨ Te esperamos lá.');
                location.reload(); // Limpa o formulário
            }
        }
    </script>
</body>
</html>
